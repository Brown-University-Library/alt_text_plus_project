# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Initial image alt-text comparison across two LM Studio models

prompts:
  - file://../../alt_text_app/lib/prompt.md

providers:
  - id: file://provider.py
    label: primary-lm-studio-model-temperature-0
    config:
      model_params:
        temperature: 0
      timeout_seconds: 120

  - id: file://provider.py
    label: comparison-lm-studio-model-temperature-0
    config:
      model_env_var: ALT_TEXT_EVAL_MODEL_A
      allow_app_model_fallback: false
      model_params:
        temperature: 0
      timeout_seconds: 120

tests:
  - file://initial_images_cases.yaml
